name: publish-package
run-name: publish ${{ inputs.release_version }} to mooncakes

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish. Must exactly match moon.mod."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: verify release version
        run: |
          pkg_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' moon.mod)"
          echo "moon.mod version: $pkg_version"
          echo "workflow input version: ${{ inputs.release_version }}"
          test -n "$pkg_version"
          test "$pkg_version" = "${{ inputs.release_version }}"

      - name: update registry
        run: moon update

      - name: build all targets
        run: moon build --target all

      - name: check all targets
        run: moon check --target all --frozen

      - name: test default target
        run: moon test --frozen

      - name: test native isolation
        run: moon test src/runner --target native --frozen

      - name: publish mooncake
        env:
          SECRET: ${{ secrets.LUNA_MOONCAKE }}
        run: |
          test -n "$SECRET"
          mkdir -p "$HOME/.moon"
          trap 'rm -f "$HOME/.moon/credentials.json"' EXIT
          printf '%s' "$SECRET" > "$HOME/.moon/credentials.json"
          moon publish

      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.release_version }}" \
            --target "$GITHUB_SHA" \
            --title "mare_mark ${{ inputs.release_version }}" \
            --generate-notes
