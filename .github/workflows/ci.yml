name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  moonbit:
    name: moonbit
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: update registry
        run: moon update

      - name: build all targets
        run: moon build --target all

      - name: check all targets
        run: moon check --target all

      - name: test default target
        run: moon test

      - name: test JavaScript target
        run: moon test --target js

      - name: test native target
        run: moon test --target native

      - name: smoke test native CLI
        run: |
          moon run src/cli --target native -- report testdata/report/sample.jsonl /tmp/mare-mark-report.html
          test -s /tmp/mare-mark-report.html
          moon run src/cli --target native -- replay --dry-run testdata/replay/sample.jsonl

      - name: enforce coverage budget
        run: |
          moon coverage analyze > /tmp/mare-mark-coverage.txt
          uncovered="$(sed -n 's/^Total: \([0-9][0-9]*\) uncovered.*/\1/p' /tmp/mare-mark-coverage.txt | tail -1)"
          test -n "$uncovered"
          echo "uncovered executable lines: $uncovered"
          test "$uncovered" -le 360

      - name: verify public interfaces
        run: |
          moon info
          git diff --exit-code -- 'src/**/pkg.generated.mbti'

      - name: verify formatting
        run: moon fmt --check
